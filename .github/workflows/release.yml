name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Find release artifacts
        id: artifacts
        shell: powershell
        run: |
          $installer = Get-ChildItem -Path "dist" -Filter "Halko Voice-*.exe" -File | Where-Object { $_.Name -notlike "*portable*" } | Select-Object -First 1
          $portable = Get-ChildItem -Path "dist" -Filter "Halko Voice-portable-*.exe" -File | Select-Object -First 1
          $blockmap = Get-ChildItem -Path "dist" -Filter "*.blockmap" -File | Select-Object -First 1
          $latest = Get-ChildItem -Path "dist" -Filter "latest.yml" -File | Select-Object -First 1
          
          $files = @()
          if ($installer) { $files += $installer.FullName }
          if ($portable) { $files += $portable.FullName }
          if ($blockmap) { $files += $blockmap.FullName }
          if ($latest) { $files += $latest.FullName }
          
          $fileList = $files -join ","
          Write-Host "Found files: $fileList"
          echo "files=$fileList" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: ${{ steps.artifacts.outputs.files }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          generateReleaseNotes: true
